name: Update submodules

on:
  repository_dispatch:
    types: [submodule-update]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update all submodules to latest
        # --remote without --merge resets each submodule to its remote tip
        # (default 'checkout' update mode). The .website repo never commits
        # inside submodule trees, so there's nothing to preserve via merge —
        # using --merge fails with 'unrelated histories' if any upstream
        # repo rewrites its history (force-pushed feature branches, etc.).
        run: git submodule update --remote --recursive

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || \
            git commit -am "chore: update submodules" && git push
